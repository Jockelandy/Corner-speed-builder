<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corner Speed Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Corner Speed Builder</h1>

    <h2>Aircraft</h2>

    <div class="grid">

        <label>Aircraft</label>
        <input type="text" id="aircraft">

        <label>Version</label>
        <input type="text" id="version">

        <label>Country</label>
        <input type="text" id="country">

    </div>

    <h2>Weight</h2>

    <div class="grid">

        <label>Empty Weight</label>
        <div class="input-group">
            <input type="number" id="emptyWeight">
            <select id="emptyWeightUnit">
                <option value="kg">kg</option>
                <option value="lb">lb</option>
            </select>
        </div>

        <label>Internal Fuel</label>
        <div class="input-group">
            <input type="number" id="fuel">
            <select id="fuelUnit">
                <option value="kg">kg</option>
                <option value="liter">Liter</option>
                <option value="usgal">US gal</option>
                <option value="impgal">Imp gal</option>
            </select>
        </div>

        <label>MTOW</label>
        <div class="input-group">
            <input type="number" id="maxWeight">
            <select id="maxWeightUnit">
                <option value="kg">kg</option>
                <option value="lb">lb</option>
            </select>
        </div>

    </div>

    <h2>Performance</h2>

    <div class="grid">

        <label>Military Thrust</label>
        <div class="input-group">
            <input type="number" id="milPower">
            <select id="milUnit">
                <option value="kN">kN</option>
                <option value="lbf">lbf</option>
                <option value="kgf">kgf</option>
            </select>
        </div>

        <label>Afterburner Thrust</label>
        <div class="input-group">
            <input type="number" id="abPower">
            <select id="abUnit">
                <option value="kN">kN</option>
                <option value="lbf">lbf</option>
                <option value="kgf">kgf</option>
            </select>
        </div>

        <label>Wing Area</label>
        <div class="input-group">
            <input type="number" id="wingArea">
            <select id="wingAreaUnit">
                <option value="m2">m²</option>
                <option value="ft2">ft²</option>
            </select>
        </div>

        <label>Wing Type</label>
        <select id="wingType">
            <option>Straight</option>
            <option>Swept</option>
            <option>Delta</option>
            <option>Double Delta</option>
            <option>Variable Sweep</option>
        </select>

    </div>

    <div class="buttons">
        <button id="calculateBtn">Calculate</button>
        <button id="resetBtn">Reset</button>
    </div>

    <h2>Calculated Performance</h2>

    <table>

        <thead>

        <tr>
            <th>Load</th>
            <th>Weight</th>
            <th>Wing Load</th>
            <th>Mil TWR</th>
            <th>AB TWR</th>
        </tr>

        </thead>

        <tbody>

        <tr>
            <td>Light</td>
            <td id="lightWeight">-</td>
            <td id="lightWingLoading">-</td>
            <td id="lightMilTwr">-</td>
            <td id="lightAbTwr">-</td>
        </tr>

        <tr>
            <td>Medium</td>
            <td id="mediumWeight">-</td>
            <td id="mediumWingLoading">-</td>
            <td id="mediumMilTwr">-</td>
            <td id="mediumAbTwr">-</td>
        </tr>

        <tr>
            <td>Heavy</td>
            <td id="heavyWeight">-</td>
            <td id="heavyWingLoading">-</td>
            <td id="heavyMilTwr">-</td>
            <td id="heavyAbTwr">-</td>
        </tr>

        </tbody>

    </table>

</div>

<script src="script.js"></script>

</body>
</html>

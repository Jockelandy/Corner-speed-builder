<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corner Speed Builder</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>✈️ Corner Speed Builder</h1>

<div class="card">

<h2>Aircraft</h2>

<label>Aircraft</label>
<input id="aircraft" type="text">

<label>Variant</label>
<input id="version" type="text">

<label>Country</label>
<input id="country" type="text">

<h2>Weight</h2>

<label>Empty Weight</label>
<div class="input-row">
    <input id="emptyWeight" type="number">
    <select id="emptyWeightUnit">
        <option value="kg">kg</option>
        <option value="lb">lb</option>
    </select>
</div>

<label>Internal Fuel</label>
<div class="input-row">
    <input id="fuel" type="number">
    <select id="fuelUnit">
        <option value="kg">kg</option>
        <option value="liter">Liter</option>
        <option value="usgal">US Gallon</option>
        <option value="impgal">Imp Gallon</option>
    </select>
</div>

<label>External Load</label>
<div class="input-row">
    <input id="externalLoad" type="number">
    <select id="externalLoadUnit">
        <option value="kg">kg</option>
        <option value="lb">lb</option>
    </select>
</div>

<label>Maximum Take-Off Weight</label>
<div class="input-row">
    <input id="maxWeight" type="number">
    <select id="maxWeightUnit">
        <option value="kg">kg</option>
        <option value="lb">lb</option>
    </select>
</div>

<h2>Performance</h2>

<label>Military Thrust</label>
<div class="input-row">
    <input id="milPower" type="number">
    <select id="milUnit">
        <option value="kN">kN</option>
        <option value="lbf">lbf</option>
    </select>
</div>

<label>Afterburner Thrust</label>
<div class="input-row">
    <input id="abPower" type="number">
    <select id="abUnit">
        <option value="kN">kN</option>
        <option value="lbf">lbf</option>
    </select>
</div>

<label>Wing Area</label>
<div class="input-row">
    <input id="wingArea" type="number">
    <select id="wingAreaUnit">
        <option value="m2">m²</option>
        <option value="ft2">ft²</option>
    </select>
</div>

<label>Wing Type</label>
<select id="wingType">
    <option>Straight</option>
    <option>Swept</option>
    <option>Delta</option>
    <option>Double Delta</option>
    <option>Variable Sweep</option>
</select>

<h2>Calculated Values</h2>

<label>Calculated Weight</label>
<input id="calcWeight" readonly>

<label>Wing Loading</label>
<input id="wingLoading" readonly>

<label>Thrust-to-Weight Ratio</label>
<input id="twr" readonly>

<br><br>

<button id="calculateBtn">Calculate</button>
<button id="resetBtn">Reset</button>

</div>

<script src="script.js"></script>

</body>
</html>

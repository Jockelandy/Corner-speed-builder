<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corner Speed Builder v1.0</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>✈️ Corner Speed Builder</h1>

<!-- ========================= -->
<!-- AIRCRAFT -->
<!-- ========================= -->

<h2>Aircraft</h2>

<label>Aircraft</label>
<input type="text" id="aircraft">

<label>Variant</label>
<input type="text" id="variant">

<label>Country</label>
<input type="text" id="country">

<!-- ========================= -->
<!-- WEIGHT -->
<!-- ========================= -->

<h2>Weight</h2>

<label>Empty Weight (kg)</label>
<input type="number" id="emptyWeight">

<label>Internal Fuel (kg)</label>
<input type="number" id="internalFuel">

<label>Maximum External Load (kg)</label>
<input type="number" id="maxExternalLoad">

<label>MTOW (kg)</label>
<input type="number" id="mtow">

<!-- ========================= -->
<!-- PERFORMANCE -->
<!-- ========================= -->

<h2>Performance</h2>

<label>Military Thrust (kN)</label>
<input type="number" id="milThrust">

<label>Afterburner Thrust (kN)</label>
<input type="number" id="abThrust">

<label>Wing Area (m²)</label>
<input type="number" id="wingArea">

<label>Wing Type</label>

<select id="wingType">
<option>Straight Wing</option>
<option>Swept Wing</option>
<option>Delta Wing</option>
<option>Double Delta</option>
<option>Variable Sweep</option>
</select>

<!-- ========================= -->
<!-- LOAD CLASSES -->
<!-- ========================= -->

<h2>Load Classes</h2>

<table>

<tr>
<th></th>
<th>Light</th>
<th>Medium</th>
<th>Heavy</th>
</tr>

<tr>
<td>Load Points</td>
<td id="lightLP">-</td>
<td id="mediumLP">-</td>
<td id="heavyLP">-</td>
</tr>

<tr>
<td>Weight</td>
<td id="lightWeight">-</td>
<td id="mediumWeight">-</td>
<td id="heavyWeight">-</td>
</tr>

<tr>
<td>Wing Loading</td>
<td id="lightWingLoading">-</td>
<td id="mediumWingLoading">-</td>
<td id="heavyWingLoading">-</td>
</tr>

<tr>
<td>Mil TWR</td>
<td id="lightMilTwr">-</td>
<td id="mediumMilTwr">-</td>
<td id="heavyMilTwr">-</td>
</tr>

<tr>
<td>AB TWR</td>
<td id="lightAbTwr">-</td>
<td id="mediumAbTwr">-</td>
<td id="heavyAbTwr">-</td>
</tr>

<tr>
<td>EBK Index</td>
<td id="lightEBK">-</td>
<td id="mediumEBK">-</td>
<td id="heavyEBK">-</td>
</tr>

<tr>
<td>Fuel Points</td>
<td id="lightFuel">-</td>
<td id="mediumFuel">-</td>
<td id="heavyFuel">-</td>
</tr>

</table>

<br>

<button onclick="calculate()">
Calculate
</button>

<button onclick="resetForm()">
Reset
</button>

</div>

<script src="script.js"></script>

</body>
</html>
